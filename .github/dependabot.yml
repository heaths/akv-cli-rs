version: 2

updates:
- package-ecosystem: cargo
  directory: /
  schedule:
    interval: weekly
  cooldown:
    default-days: 7
  groups:
    cargo-dependencies:
      patterns:
      - "*"

- package-ecosystem: npm
  directory: /
  schedule:
    interval: weekly
  cooldown:
    default-days: 7
  groups:
    npm-dependencies:
      patterns:
      - "*"

- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
  cooldown:
    default-days: 7
  groups:
    github-actions:
      patterns:
      - "*"
